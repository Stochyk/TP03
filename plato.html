<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

    <section class="screen-container">
        <header class="dish-hero" style="background-image: url('https://images.unsplash.com/photo-1546069901-ba9599a7e63c?q=80&w=600');">
            <div class="price-badge">$6.99</div>
        </header>

        <main class="plato-info">
            <h2 class="plato-titulo">Oven Roasted Chicken <br>Chopped Salad</h2>
            <p class="description-text">
                Lorem ipsum dolor sit amet, consectetur adipisicing elit, sed do eiusmod tempor incididunt ut minim veniam, quis nostrud exercitation ullamco.
            </p>

            <div class="notes-container">
                <input type="text" placeholder="Add a note (extra sauce, no onions, etc.)" class="notes-input">
            </div>
        </main>

        <footer class="cart-action-bar">
            <div class="cantidad-selector">
                <button class="btn-cntd">-</button>
                <span class="cntd-value">2</span>
                <button class="btn-cntd">+</button>
            </div>
            <button class="btn-add">AÑADIR</button>
        </footer>
    </section>

</body>
</html>
